<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <title>Firebase Cloud SCADA Paneli</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e272e; color: #f5f6fa; text-align: center; padding:20px; user-select: none; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
        .card { background: #2f3640; border-radius: 12px; padding: 20px; width: 200px; box-shadow: 0 6px 12px rgba(0,0,0,0.3); border: 1px solid #444; }
        .value { font-size: 28px; font-weight: bold; color: #00a8ff; margin: 10px 0; font-family: monospace; }
        .speed-card { background: #2c3e50; border: 2px solid #e1b12c; }
        .speed-value { color: #e1b12c; font-size: 36px; }
        
        /* Joystick Alanı Tasarımı */
        #joystick-zone { 
            width: 200px; 
            height: 200px; 
            background: #353b48; 
            border-radius: 50%; 
            margin: 30px auto; 
            position: relative; 
            border: 3px dashed #7f8fa6;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            touch-action: none;
        }
        h1 { margin-bottom: 5px; font-size: 24px; }
        p { color: #a4b0be; margin-top: 0; }
    </style>
</head>
<body>
    <h1>BULUT PLC SCADA & JOYSTICK PANELİ</h1>
    <p>Joystick hareketleri anlık olarak PLC Motor Hızına aktarılır.</p>
    
    <div class='container'>
        <div class='card speed-card'>
            <h3>Hedef Motor Hızı</h3>
            <div class='value speed-value' id='v_motor_hiz'>0 %</div>
        </div>
        <div class='card'>
            <h3>Sıcaklık (Ana)</h3>
            <div class='value' id='v_sicaklik'>-- °C</div>
        </div>
        <div class='card'>
            <h3>Hacim (Ana)</h3>
            <div class='value' id='v_hacim'>-- L</div>
        </div>
    </div>

    <div id="joystick-zone"></div>
    <p style="font-size: 14px; color: #7f8fa6;">Hızı değiştirmek için joystick'i yukarı oynatın.</p>

    <script>
        const firebaseConfig = {
            databaseURL: "https://plc-scada-de5ef-default-rtdb.firebaseio.com/" 
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Verileri anlık okuma
        database.ref('plc_data').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('v_sicaklik').innerText = (data.sicaklik !== undefined ? data.sicaklik : 0) + ' °C';
                document.getElementById('v_hacim').innerText = (data.hacim !== undefined ? data.hacim : 0) + ' L';
                if(data.motor_hizi !== undefined) {
                    document.getElementById('v_motor_hiz').innerText = data.motor_hizi + ' %';
                }
            }
        });

        // Joystick Kurulumu
        const joystickZone = document.getElementById('joystick-zone');
        const manager = nipplejs.create({
            zone: joystickZone,
            mode: 'static',
            position: { left: '50%', top: '50%' },
            color: '#e1b12c',
            size: 130
        });

        let sonGonderilenHiz = 0;
        let komutGonderimKilitli = false;

        manager.on('move', (evt, data) => {
            if (!data.distance || !data.direction) return;

            let yonCarpani = (data.direction.y === 'up') ? 1 : -1;
            let hesaplananHiz = Math.round((data.distance / 65) * 100); 
            if(yonCarpani === -1 || hesaplananHiz < 0) hesaplananHiz = 0;
            if(hesaplananHiz > 100) hesaplananHiz = 100;

            if (hesaplananHiz !== sonGonderilenHiz && !komutGonderimKilitli) {
                sonGonderilenHiz = hesaplananHiz;
                komutGonderimKilitli = true;

                database.ref('plc_commands').set({
                    offset: 8, 
                    val: hesaplananHiz,
                    timestamp: Date.now()
                });

                // Kapatılmayan parantez hatası burada düzeltildi:
                setTimeout(() => { komutGonderimKilitli = false; }, 150);
            }
        });

        manager.on('end', () => {
            sonGonderilenHiz = 0;
            database.ref('plc_commands').set({
                offset: 8,
                val: 0,
                timestamp: Date.now()
            });
        });
    </script>
</body>
</html>
