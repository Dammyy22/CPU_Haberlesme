<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <title>Firebase Cloud SCADA Paneli</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e272e; color: #f5f6fa; text-align: center; padding:20px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
        .card { background: #2f3640; border-radius: 12px; padding: 25px; width: 220px; box-shadow: 0 6px 12px rgba(0,0,0,0.3); border: 1px solid #444; }
        .value { font-size: 32px; font-weight: bold; color: #00a8ff; margin: 15px 0; font-family: monospace; }
        input { padding: 8px; width: 80%; border-radius: 6px; border: 1px solid #718093; background: #353b48; color: white; text-align: center; font-size: 16px; }
        button { padding: 10px; margin-top: 12px; width: 85%; border-radius: 6px; border: none; background: #4cd137; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; }
        button:hover { background: #44bd32; }
        h3 { margin: 0; color: #dcdde1; font-size: 18px; }
    </style>
</head>
<body>
    <h1>BULUT PLC SCADA PANELİ</h1>
    <p>Veriler Firebase Bulut Veritabanı Üzerinden Dünyanın Her Yerine Anlık Akmaktadır.</p>
    
    <div class='container'>
        <div class='card'>
            <h3>Sıcaklık (Ana)</h3>
            <div class='value' id='v_sicaklik'>-- °C</div>
            <input type='number' id='i_sicaklik' placeholder='Yeni Değer'>
            <button onclick='veriYaz("sicaklik", 0)'>Buluttan Yaz</button>
        </div>
        <div class='card'>
            <h3>Hacim (Ana)</h3>
            <div class='value' id='v_hacim'>-- L</div>
            <input type='number' id='i_hacim' placeholder='Yeni Değer'>
            <button onclick='veriYaz("hacim", 2)'>Buluttan Yaz</button>
        </div>
        <div class='card'>
            <h3>Sıcaklık 1</h3>
            <div class='value' id='v_sicaklik_1'>-- °C</div>
            <input type='number' id='i_sicaklik_1' placeholder='Yeni Değer'>
            <button onclick='veriYaz("sicaklik_1", 4)'>Buluttan Yaz</button>
        </div>
        <div class='card'>
            <h3>Hacim 1</h3>
            <div class='value' id='v_hacim_1'>-- L</div>
            <input type='number' id='i_hacim_1' placeholder='Yeni Değer'>
            <button onclick='veriYaz("hacim_1", 6)'>Buluttan Yaz</button>
        </div>
    </div>

    <script>
        // Senin Firebase URL'in buraya entegre edildi
        const firebaseConfig = {
            databaseURL: "https://plc-scada-de5ef-default-rtdb.firebaseio.com/" 
        };
        
        // Firebase Başlatılıyor
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Bulut Veritabanını Anlık Dinleme Mekanizması
        database.ref('plc_data').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('v_sicaklik').innerText = (data.sicaklik !== undefined ? data.sicaklik : 0) + ' °C';
                document.getElementById('v_hacim').innerText = (data.hacim !== undefined ? data.hacim : 0) + ' L';
                document.getElementById('v_sicaklik_1').innerText = (data.sicaklik_1 !== undefined ? data.sicaklik_1 : 0) + ' °C';
                document.getElementById('v_hacim_1').innerText = (data.hacim_1 !== undefined ? data.hacim_1 : 0) + ' L';
            }
        });

        // Butona basıldığında komutu bulut kuyruğuna yazma fonksiyonu
        function veriYaz(key, offset) {
            let inputId = 'i_' + key;
            let deger = document.getElementById(inputId).value;
            if(deger === "") { alert("Lütfen bir değer girin!"); return; }
            
            database.ref('plc_commands').set({
                offset: offset,
                val: parseInt(deger),
                timestamp: Date.now()
            }).then(() => {
                alert("Yazma komutu buluta gönderildi. PC backend'i PLC'ye işleyecek.");
                document.getElementById(inputId).value = "";
            });
        }
    </script>
</body>
</html>
